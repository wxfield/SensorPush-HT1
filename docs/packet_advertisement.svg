<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" font-family="Arial, Helvetica, sans-serif">

  <!-- Title -->
  <text x="16" y="28" font-size="15" font-weight="bold" fill="#111">SensorPush HT1 — BLE Advertisement Manufacturer Data</text>
  <text x="16" y="46" font-size="11" fill="#555">4 bytes · Passive broadcast · No connection required</text>

  <!-- Bit ruler -->
  <text x="16"  y="68" font-size="10" fill="#888">0</text>
  <text x="191" y="68" font-size="10" fill="#888">7</text>
  <text x="197" y="68" font-size="10" fill="#888">8</text>
  <text x="371" y="68" font-size="10" fill="#888">15</text>
  <text x="377" y="68" font-size="10" fill="#888">16</text>
  <text x="551" y="68" font-size="10" fill="#888">23</text>
  <text x="557" y="68" font-size="10" fill="#888">24</text>
  <text x="699" y="68" font-size="10" fill="#888">31</text>

  <!-- Tick marks -->
  <g stroke="#bbb" stroke-width="1">
    <line x1="16"  y1="72" x2="16"  y2="80"/>
    <line x1="196" y1="72" x2="196" y2="80"/>
    <line x1="376" y1="72" x2="376" y2="80"/>
    <line x1="556" y1="72" x2="556" y2="80"/>
    <line x1="706" y1="72" x2="706" y2="80"/>
  </g>

  <!-- ── Row 1: Byte 0 | Byte 1 ── -->
  <!-- Byte 0: hum[7:0] -->
  <rect x="16"  y="80" width="180" height="50" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="106" y="100" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Byte 0</text>
  <text x="106" y="116" font-size="10" fill="#1e40af" text-anchor="middle">humidity[7:0]</text>
  <text x="106" y="128" font-size="9" fill="#3b82f6" text-anchor="middle">(8 bits)</text>

  <!-- Byte 1: temp[3:0] | hum[11:8] -->
  <rect x="196" y="80" width="90"  height="50" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="241" y="100" font-size="10" font-weight="bold" fill="#713f12" text-anchor="middle">Byte 1 [7:4]</text>
  <text x="241" y="114" font-size="9"  fill="#713f12" text-anchor="middle">temp[3:0]</text>
  <text x="241" y="126" font-size="9"  fill="#ca8a04" text-anchor="middle">(4 bits)</text>

  <rect x="286" y="80" width="90"  height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="331" y="100" font-size="10" font-weight="bold" fill="#14532d" text-anchor="middle">Byte 1 [3:0]</text>
  <text x="331" y="114" font-size="9"  fill="#14532d" text-anchor="middle">humidity[11:8]</text>
  <text x="331" y="126" font-size="9"  fill="#16a34a" text-anchor="middle">(4 bits)</text>

  <!-- Byte 2: temp[11:4] -->
  <rect x="376" y="80" width="180" height="50" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="466" y="100" font-size="11" font-weight="bold" fill="#713f12" text-anchor="middle">Byte 2</text>
  <text x="466" y="116" font-size="10" fill="#713f12" text-anchor="middle">temp[11:4]</text>
  <text x="466" y="128" font-size="9"  fill="#ca8a04" text-anchor="middle">(8 bits)</text>

  <!-- Byte 3: reserved | device_type[4:0] | temp[13:12] | reserved -->
  <rect x="556" y="80"  width="22"  height="50" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="567" y="103" font-size="8" fill="#6b7280" text-anchor="middle">rsv</text>
  <text x="567" y="116" font-size="8" fill="#6b7280" text-anchor="middle">[7]</text>

  <rect x="578" y="80"  width="70"  height="50" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="613" y="99"  font-size="9"  font-weight="bold" fill="#831843" text-anchor="middle">device_type</text>
  <text x="613" y="112" font-size="9"  fill="#831843" text-anchor="middle">[6:2]</text>
  <text x="613" y="125" font-size="8"  fill="#db2777" text-anchor="middle">= 1 for HT1</text>

  <rect x="648" y="80"  width="36"  height="50" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="666" y="100" font-size="9"  font-weight="bold" fill="#713f12" text-anchor="middle">temp</text>
  <text x="666" y="113" font-size="9"  fill="#713f12" text-anchor="middle">[13:12]</text>
  <text x="666" y="126" font-size="8"  fill="#ca8a04" text-anchor="middle">[1:0]</text>

  <rect x="684" y="80"  width="22"  height="50" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="695" y="103" font-size="8" fill="#6b7280" text-anchor="middle">rsv</text>
  <text x="695" y="116" font-size="8" fill="#6b7280" text-anchor="middle">[0]</text>

  <!-- ── Decode formulas ── -->
  <rect x="16" y="148" width="690" height="1" fill="#e5e7eb"/>

  <text x="16"  y="168" font-size="12" font-weight="bold" fill="#111">Decode</text>

  <rect x="16" y="176" width="690" height="88" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <text x="30" y="196" font-size="11" fill="#374151">
    <tspan font-weight="bold">hum_raw</tspan>
    <tspan>  = Byte0 + ((Byte1 &amp; 0x0F) &lt;&lt; 8)</tspan>
  </text>
  <text x="30" y="214" font-size="11" fill="#374151">
    <tspan font-weight="bold">temp_raw</tspan>
    <tspan> = (Byte1 &gt;&gt; 4) + (Byte2 &lt;&lt; 4) + ((Byte3 &amp; 0x03) &lt;&lt; 12)</tspan>
  </text>
  <text x="30" y="232" font-size="11" fill="#374151">
    <tspan font-weight="bold">humidity</tspan>
    <tspan> = −6.0 + (125.0 × hum_raw / 4096.0)        [%RH, clamp 0–100]</tspan>
  </text>
  <text x="30" y="250" font-size="11" fill="#374151">
    <tspan font-weight="bold">temp_°C</tspan>
    <tspan>  = −46.85 + (175.72 × temp_raw / 16384.0)   [°C]</tspan>
  </text>

  <text x="16" y="275" font-size="9" fill="#9ca3af">device_type field: 0x01 = HT1 · Sensor: Sensirion SHT20 (Si7021-compatible encoding)</text>
</svg>
