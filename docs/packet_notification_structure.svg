<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" font-family="Arial, Helvetica, sans-serif">

  <!-- Title -->
  <text x="16" y="28" font-size="15" font-weight="bold" fill="#111">SensorPush HT1 — History Notification · Wire Format</text>
  <text x="16" y="46" font-size="11" fill="#555">20 bytes · 5 fields of 4 bytes each · Characteristic ef09000a</text>

  <!-- Byte ruler -->
  <text x="16"  y="68" font-size="10" fill="#888">0</text>
  <text x="148" y="68" font-size="10" fill="#888">4</text>
  <text x="286" y="68" font-size="10" fill="#888">8</text>
  <text x="424" y="68" font-size="10" fill="#888">12</text>
  <text x="562" y="68" font-size="10" fill="#888">16</text>
  <text x="696" y="68" font-size="10" fill="#888">19</text>

  <!-- Tick marks -->
  <g stroke="#bbb" stroke-width="1">
    <line x1="16"  y1="72" x2="16"  y2="80"/>
    <line x1="154" y1="72" x2="154" y2="80"/>
    <line x1="292" y1="72" x2="292" y2="80"/>
    <line x1="430" y1="72" x2="430" y2="80"/>
    <line x1="568" y1="72" x2="568" y2="80"/>
    <line x1="706" y1="72" x2="706" y2="80"/>
  </g>

  <!-- Block 0: Timestamp (purple) -->
  <rect x="16"  y="80" width="138" height="70" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="85"  y="105" font-size="11" font-weight="bold" fill="#4c1d95" text-anchor="middle">Bytes 0–3</text>
  <text x="85"  y="120" font-size="10" fill="#4c1d95" text-anchor="middle">uint32 LE</text>
  <text x="85"  y="136" font-size="9"  fill="#7c3aed" text-anchor="middle">Unix timestamp</text>

  <!-- Block 1: Record 1 (blue) -->
  <rect x="154" y="80" width="138" height="70" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="223" y="105" font-size="11" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Bytes 4–7</text>
  <text x="223" y="120" font-size="10" fill="#1e3a8a" text-anchor="middle">Si7021 record</text>
  <text x="223" y="136" font-size="9"  fill="#2563eb" text-anchor="middle">T + 0s</text>

  <!-- Block 2: Record 2 (green) -->
  <rect x="292" y="80" width="138" height="70" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="361" y="105" font-size="11" font-weight="bold" fill="#14532d" text-anchor="middle">Bytes 8–11</text>
  <text x="361" y="120" font-size="10" fill="#14532d" text-anchor="middle">Si7021 record</text>
  <text x="361" y="136" font-size="9"  fill="#16a34a" text-anchor="middle">T + 60s</text>

  <!-- Block 3: Record 3 (green) -->
  <rect x="430" y="80" width="138" height="70" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="499" y="105" font-size="11" font-weight="bold" fill="#14532d" text-anchor="middle">Bytes 12–15</text>
  <text x="499" y="120" font-size="10" fill="#14532d" text-anchor="middle">Si7021 record</text>
  <text x="499" y="136" font-size="9"  fill="#16a34a" text-anchor="middle">T + 120s</text>

  <!-- Block 4: Record 4 (green) -->
  <rect x="568" y="80" width="138" height="70" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="637" y="105" font-size="11" font-weight="bold" fill="#14532d" text-anchor="middle">Bytes 16–19</text>
  <text x="637" y="120" font-size="10" fill="#14532d" text-anchor="middle">Si7021 record</text>
  <text x="637" y="136" font-size="9"  fill="#16a34a" text-anchor="middle">T + 180s</text>

  <!-- Footer -->
  <rect x="16" y="162" width="690" height="1" fill="#e5e7eb"/>
  <text x="16" y="177" font-size="9" fill="#9ca3af">Notifications delivered newest-first · timestamps decrease across packets · records within each packet advance +60s</text>
  <text x="16" y="191" font-size="9" fill="#9ca3af">0xFFFFFFFF in any record slot = end-of-history sentinel · Si7021 record bit layout: see advertisement diagram</text>

</svg>
