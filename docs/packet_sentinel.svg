<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="490" viewBox="0 0 720 490" font-family="Arial, Helvetica, sans-serif">

  <!-- Title -->
  <text x="16" y="28" font-size="15" font-weight="bold" fill="#111">SensorPush HT1 — End-of-History Sentinel Notification</text>
  <text x="16" y="46" font-size="11" fill="#555">20 bytes · Final packet · 0xFFFFFFFF marks no more records at that position or beyond</text>
  <text x="16" y="62" font-size="10" fill="#888" font-style="italic">Example:  c6 77 ad 69  07 95 92 05  05 b5 92 01  ff ff ff ff  ff ff ff ff</text>

  <!-- Row 1: Timestamp -->
  <text x="16"  y="82" font-size="10" fill="#888">Byte 0</text>
  <text x="178" y="82" font-size="10" fill="#888">Byte 3</text>
  <rect x="16"  y="86" width="685" height="50" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="358" y="107" font-size="12" font-weight="bold" fill="#4c1d95" text-anchor="middle">Bytes 0–3 · Unix Timestamp</text>
  <text x="358" y="125" font-size="10" fill="#4c1d95" text-anchor="middle">uint32 little-endian · UTC epoch seconds · Timestamp of oldest record in this packet</text>

  <!-- Row 2: Record 1 -->
  <text x="16"  y="155" font-size="10" fill="#888">Byte 4</text>
  <text x="178" y="155" font-size="10" fill="#888">Byte 7</text>
  <rect x="16"  y="159" width="685" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="358" y="180" font-size="12" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Bytes 4–7 · Sensor Record 1</text>
  <text x="358" y="198" font-size="10" fill="#1e3a8a" text-anchor="middle">Si7021-packed · T + 0s · valid reading</text>

  <!-- Row 3: Record 2 -->
  <text x="16"  y="228" font-size="10" fill="#888">Byte 8</text>
  <text x="172" y="228" font-size="10" fill="#888">Byte 11</text>
  <rect x="16"  y="232" width="685" height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="358" y="253" font-size="12" font-weight="bold" fill="#14532d" text-anchor="middle">Bytes 8–11 · Sensor Record 2</text>
  <text x="358" y="271" font-size="10" fill="#14532d" text-anchor="middle">Si7021-packed · T + 60s · valid reading</text>

  <!-- Row 4: Sentinel 1 -->
  <text x="16"  y="301" font-size="10" fill="#888">Byte 12</text>
  <text x="172" y="301" font-size="10" fill="#888">Byte 15</text>
  <rect x="16"  y="305" width="685" height="50" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="358" y="326" font-size="12" font-weight="bold" fill="#7f1d1d" text-anchor="middle">Bytes 12–15 · 0xFFFFFFFF — Sentinel</text>
  <text x="358" y="344" font-size="10" fill="#7f1d1d" text-anchor="middle">No more records at this position · stop processing</text>

  <!-- Row 5: Sentinel 2 -->
  <text x="16"  y="374" font-size="10" fill="#888">Byte 16</text>
  <text x="172" y="374" font-size="10" fill="#888">Byte 19</text>
  <rect x="16"  y="378" width="685" height="50" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="358" y="399" font-size="12" font-weight="bold" fill="#7f1d1d" text-anchor="middle">Bytes 16–19 · 0xFFFFFFFF — Sentinel</text>
  <text x="358" y="417" font-size="10" fill="#7f1d1d" text-anchor="middle">Confirmed end of history · download complete</text>

  <!-- Legend -->
  <rect x="16" y="441" width="685" height="1" fill="#e5e7eb"/>

  <rect x="16"  y="451" width="14" height="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="36"  y="462" font-size="10" fill="#374151">Timestamp</text>

  <rect x="140" y="451" width="14" height="14" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="462" font-size="10" fill="#374151">Valid record</text>

  <rect x="270" y="451" width="14" height="14" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="290" y="462" font-size="10" fill="#374151">Sentinel (0xFFFFFFFF) — no record here or after</text>

  <text x="16" y="482" font-size="9" fill="#9ca3af">Sentinel may appear in any record slot · once seen, all remaining slots in this and subsequent packets are also sentinels</text>

</svg>
