# Add these two blocks to your existing telegraf.conf
# at /home/wxfield/influxdb-telegraf/telegraf.conf

# ── HT1 live sensor readings (temp/humidity every 60s) ────────────────────────
[[inputs.mqtt_consumer]]
  servers          = ["tcp://192.168.1.188:1883"]
  topics           = ["sensorpush/+/sensor"]
  username         = "admin"
  password         = "09wTc80!"
  client_id        = "telegraf-ht1-sensor"
  data_format      = "json"
  name_override    = "sensorpush_sensor"
  json_time_key    = "timestamp"
  json_time_format = "unix"
  tag_keys         = []

# ── HT1 daily diagnostic (battery + unknown characteristics) ──────────────────
[[inputs.mqtt_consumer]]
  servers          = ["tcp://192.168.1.188:1883"]
  topics           = ["sensorpush/+/diagnostic"]
  username         = "admin"
  password         = "09wTc80!"
  client_id        = "telegraf-ht1-diagnostic"
  data_format      = "json"
  name_override    = "sensorpush_diagnostic"
  json_time_key    = "timestamp"
  json_time_format = "unix"
  tag_keys         = []
