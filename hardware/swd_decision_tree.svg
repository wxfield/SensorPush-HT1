<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="900" viewBox="0 0 820 900" font-family="Arial, Helvetica, sans-serif">

  <!-- ── Background ── -->
  <rect width="820" height="900" fill="#f8fafc"/>

  <!-- ══════════════════════════════════════════════
       TITLE
  ══════════════════════════════════════════════ -->
  <text x="410" y="36" font-size="16" font-weight="bold" fill="#111" text-anchor="middle">nRF51822 SWD Firmware Readback — Decision Tree</text>
  <text x="410" y="54" font-size="11" fill="#6b7280" text-anchor="middle">SensorPush HT1 · hardware/pcb_reverse_engineering.md</text>

  <!-- ══════════════════════════════════════════════
       NODE: START
  ══════════════════════════════════════════════ -->
  <!-- rounded rect -->
  <rect x="285" y="70" width="250" height="56" rx="28" fill="#4f46e5" stroke="#3730a3" stroke-width="1.5"/>
  <text x="410" y="96" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Step 1 — Prepare</text>
  <text x="410" y="114" font-size="10" fill="#c7d2fe" text-anchor="middle">Pull battery · solder header · connect programmer</text>

  <!-- arrow down -->
  <line x1="410" y1="126" x2="410" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════
       NODE: deviceversion
  ══════════════════════════════════════════════ -->
  <rect x="260" y="155" width="300" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="410" y="176" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle" font-family="Courier New, monospace">nrfjprog --deviceversion</text>
  <text x="410" y="195" font-size="10" fill="#94a3b8" text-anchor="middle">Power from programmer 3.3V only</text>

  <!-- arrow down -->
  <line x1="410" y1="207" x2="410" y2="236" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════
       DECISION: responds?
  ══════════════════════════════════════════════ -->
  <!-- diamond -->
  <polygon points="410,236 530,278 410,320 290,278" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="410" y="273" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle">Chip responds?</text>
  <text x="410" y="290" font-size="10" fill="#92400e" text-anchor="middle">Device detected</text>

  <!-- YES arrow down -->
  <line x1="410" y1="320" x2="410" y2="352" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="418" y="340" font-size="10" fill="#16a34a" font-weight="bold">YES</text>

  <!-- NO arrow left -->
  <line x1="290" y1="278" x2="180" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="270" font-size="10" fill="#dc2626" font-weight="bold">NO</text>

  <!-- NO box -->
  <rect x="60" y="252" width="120" height="52" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="273" font-size="10" font-weight="bold" fill="#991b1b" text-anchor="middle">Check wiring</text>
  <text x="120" y="287" font-size="9" fill="#991b1b" text-anchor="middle">Verify SWDIO/SWDCLK</text>
  <text x="120" y="300" font-size="9" fill="#991b1b" text-anchor="middle">with multimeter</text>

  <!-- ══════════════════════════════════════════════
       NODE: readback
  ══════════════════════════════════════════════ -->
  <rect x="260" y="352" width="300" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="410" y="373" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle" font-family="Courier New, monospace">nrfjprog --readback</text>
  <text x="410" y="392" font-size="10" fill="#94a3b8" text-anchor="middle">Check readback protection status</text>

  <!-- arrow down -->
  <line x1="410" y1="404" x2="410" y2="433" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════
       DECISION: protected?
  ══════════════════════════════════════════════ -->
  <polygon points="410,433 530,475 410,517 290,475" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="410" y="470" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle">Readback</text>
  <text x="410" y="487" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle">protected?</text>

  <!-- NO (unprotected) arrow RIGHT -->
  <line x1="530" y1="475" x2="610" y2="475" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="562" y="467" font-size="10" fill="#16a34a" font-weight="bold">NO</text>

  <!-- YES (protected) arrow DOWN -->
  <line x1="410" y1="517" x2="410" y2="548" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="418" y="537" font-size="10" fill="#dc2626" font-weight="bold">YES</text>

  <!-- ══════════════════════════════════════════════
       SUCCESS PATH (right side)
  ══════════════════════════════════════════════ -->
  <rect x="610" y="448" width="185" height="54" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="702" y="469" font-size="10" font-weight="bold" fill="#e2e8f0" text-anchor="middle" font-family="Courier New, monospace">nrfjprog --readcode</text>
  <text x="702" y="483" font-size="10" font-weight="bold" fill="#e2e8f0" text-anchor="middle" font-family="Courier New, monospace">firmware.bin</text>
  <text x="702" y="497" font-size="9" fill="#94a3b8" text-anchor="middle">Non-destructive read</text>

  <!-- arrow down to success -->
  <line x1="702" y1="502" x2="702" y2="532" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SUCCESS terminal -->
  <rect x="610" y="532" width="185" height="70" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="702" y="553" font-size="12" font-weight="bold" fill="#14532d" text-anchor="middle">✓ Firmware Dumped</text>
  <text x="702" y="569" font-size="9" fill="#166534" text-anchor="middle">256KB flash image saved</text>
  <text x="702" y="582" font-size="9" fill="#166534" text-anchor="middle">Load in Ghidra</text>
  <text x="702" y="595" font-size="9" fill="#166534" text-anchor="middle">ARM Cortex-M0 / v6M</text>

  <!-- ══════════════════════════════════════════════
       PROTECTED PATH (center, going down)
  ══════════════════════════════════════════════ -->
  <!-- Warning box -->
  <rect x="260" y="548" width="300" height="64" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="410" y="568" font-size="11" font-weight="bold" fill="#7c2d12" text-anchor="middle">⚠  Readback Protection Enabled</text>
  <text x="410" y="584" font-size="10" fill="#9a3412" text-anchor="middle">Firmware cannot be read directly.</text>
  <text x="410" y="598" font-size="10" fill="#9a3412" text-anchor="middle">Two options — choose carefully.</text>

  <!-- arrow down to decision -->
  <line x1="410" y1="612" x2="410" y2="642" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OPTION fork label -->
  <text x="410" y="638" font-size="10" fill="#6b7280" text-anchor="middle">Choose:</text>

  <!-- horizontal fork line -->
  <line x1="175" y1="658" x2="645" y2="658" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="175" y1="642" x2="175" y2="658" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="645" y1="642" x2="645" y2="658" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Option A arrow down-left -->
  <line x1="175" y1="658" x2="175" y2="688" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Option B arrow down-right -->
  <line x1="645" y1="658" x2="645" y2="688" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OPTION A -->
  <rect x="60" y="688" width="230" height="90" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="175" y="710" font-size="11" font-weight="bold" fill="#14532d" text-anchor="middle">Option A — Walk Away</text>
  <text x="175" y="727" font-size="10" fill="#166534" text-anchor="middle">Device stays intact.</text>
  <text x="175" y="742" font-size="10" fill="#166534" text-anchor="middle">BLE protocol already decoded.</text>
  <text x="175" y="757" font-size="10" fill="#166534" text-anchor="middle">Unknown chars remain unknown.</text>
  <text x="175" y="771" font-size="9" fill="#16a34a" font-weight="bold" text-anchor="middle">Recommended unless you have a spare.</text>

  <!-- OPTION B -->
  <rect x="530" y="688" width="230" height="90" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="645" y="710" font-size="11" font-weight="bold" fill="#991b1b" text-anchor="middle">Option B — nrfjprog --recover</text>
  <text x="645" y="727" font-size="10" fill="#991b1b" text-anchor="middle">Full chip erase — irreversible.</text>
  <text x="645" y="742" font-size="10" fill="#991b1b" text-anchor="middle">SensorPush firmware gone forever.</text>
  <text x="645" y="757" font-size="10" fill="#991b1b" text-anchor="middle">Hardware survives, now blank.</text>
  <text x="645" y="771" font-size="9" fill="#dc2626" font-weight="bold" text-anchor="middle">Only with a spare unit.</text>

  <!-- ══════════════════════════════════════════════
       WHAT THE DUMP ANSWERS (bottom)
  ══════════════════════════════════════════════ -->
  <rect x="60" y="808" width="700" height="72" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="410" y="828" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">What a successful firmware dump would answer</text>
  <line x1="76" y1="834" x2="744" y2="834" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="850" font-size="10" fill="#475569" text-anchor="middle">· Purpose of ef090005, ef090006, ef09000b</text>
  <text x="200" y="865" font-size="10" fill="#475569" text-anchor="middle">· Dewpoint/VPD/Heat Index: on-device or app?</text>
  <text x="560" y="850" font-size="10" fill="#475569" text-anchor="middle">· History storage format in flash (ring buffer?)</text>
  <text x="560" y="865" font-size="10" fill="#475569" text-anchor="middle">· Is 60s measurement interval configurable?</text>

  <!-- arrows from Option A and B pointing to the bottom box -->
  <line x1="175" y1="778" x2="175" y2="800" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="175" y1="800" x2="410" y2="800" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="645" y1="778" x2="645" y2="800" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="645" y1="800" x2="410" y2="800" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="410" y1="800" x2="410" y2="808" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>

  <!-- ══════════════════════════════════════════════
       ARROW MARKERS
  ══════════════════════════════════════════════ -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
